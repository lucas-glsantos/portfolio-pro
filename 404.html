<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>

    <script>
        // Salva a rota que o Usuário tentou acessar
        sessionStorage.setItem('redirect_path', window.location.pathname);

        // Identifica se o site está rodando no Github Pages
        const isGitHub = window.location.hostname.includes('github.io');

        // Redireciona dinamicamente para a raiz correta de cada plataforma
        window.location.replace(isGitHub ? '/portfolio-pro/' : '/');
    </script>
</head>
<body>
    
</body>
</html>
